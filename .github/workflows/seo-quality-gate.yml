name: SEO Quality Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: seo-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  seo-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full build + SEO gates
        run: npm run build

      - name: Upload SEO reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-reports
          path: |
            seo-*-report.json
            public/sitemap*.xml
            public/rss.xml
          if-no-files-found: warn
