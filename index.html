<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <!-- Google Analytics 4 - uncomment and replace G-XXXXXXXXXX when you have a real Measurement ID
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XXXXXXXXXX');</script>
    -->
    <!-- Critical inline CSS - prevents FOUC while main CSS loads async -->
    <style>
      :root{--page:#000;--ink:#fff;--ink-2:rgba(255,255,255,.8);--ink-4:rgba(255,255,255,.45)}
      /* Fallback font with size-adjust to match Inter metrics - prevents CLS on font swap */
      @font-face{font-family:'Inter Fallback';src:local('Arial');size-adjust:107%;ascent-override:90%;descent-override:22%;line-gap-override:0%}
      body{margin:0;font-family:Inter,'Inter Fallback',system-ui,-apple-system,sans-serif;background:var(--page);color:var(--ink)}
      #root{min-height:100vh}
      .hero-enter{opacity:0;transform:translateY(12px);animation:heroIn .6s ease forwards}
      @keyframes heroIn{to{opacity:1;transform:translateY(0)}}
      .hero-enter-d1{animation-delay:.1s}.hero-enter-d2{animation-delay:.2s}
    </style>
    <link rel="icon" type="image/webp" sizes="32x32" href="/pz-favicon-v2.webp" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pz-favicon-v2.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Platinum Zenith | Digitalna Agencija - Marketing, Web Design, Consulting</title>
    <meta name="description" content="Platinum Zenith je digitalna agencija iz Zrenjanina. Pomažemo preduzećima da privuku više klijenata kroz digitalni marketing, web design, CRO optimizaciju i poslovno savetovanje." />
    <meta name="keywords" content="digitalni marketing, web design, agencija Srbija, Zrenjanin, CRO, consulting, Google Ads, Meta Ads, SEO, izrada sajta" />
    <meta name="author" content="Platinum Zenith" />
    <link rel="canonical" href="https://platinumzenith.com/" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Platinum Zenith | Digitalna Agencija" />
    <meta property="og:description" content="Privucite pažnju i generišite prodaju na lak, siguran i predvidljiv način. Zenith sistem za akviziciju klijenata." />
    <meta property="og:url" content="https://platinumzenith.com/" />
    <meta property="og:site_name" content="Platinum Zenith" />
    <meta property="og:locale" content="sr_RS" />
    <meta property="og:image" content="https://platinumzenith.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="Platinum Zenith - Digitalna agencija iz Zrenjanina" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Platinum Zenith | Digitalna Agencija" />
    <meta name="twitter:description" content="Privucite pažnju i generišite prodaju na lak, siguran i predvidljiv način." />
    <meta name="twitter:image" content="https://platinumzenith.com/og-image.jpg" />

    <!-- Preload LCP candidates (logo + first visible AppPreview card) -->
    <link rel="preload" as="image" href="/pz-logo.svg" type="image/svg+xml" fetchpriority="high" />
    <link rel="preload" as="image" href="/truffles-03.webp" type="image/webp" fetchpriority="high" />

    <!-- Self-hosted fonts - preload Latin (most used) to eliminate FOIT -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-cyrillic.woff2" crossorigin />

    <!-- Theme color -->
    <meta name="theme-color" content="#000000" />

    <!-- Geo targeting -->
    <meta name="geo.region" content="RS" />
    <meta name="geo.placename" content="Zrenjanin" />

    <!-- Structured Data - Organization + LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Platinum Zenith",
      "url": "https://platinumzenith.com",
      "logo": "https://platinumzenith.com/pz-icon.webp",
      "image": "https://platinumzenith.com/og-image.jpg",
      "description": "Digitalna agencija iz Zrenjanina. Digitalni marketing, web dizajn, CRO optimizacija i poslovno savetovanje za firme koje zele vise klijenata.",
      "telephone": "+381668168929",
      "email": "aleksandar@platinumzenith.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Zrenjanin",
        "addressCountry": "RS"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 45.3833,
        "longitude": 20.3833
      },
      "areaServed": [
        { "@type": "Country", "name": "Serbia" },
        { "@type": "Country", "name": "Croatia" },
        { "@type": "Country", "name": "Bosnia and Herzegovina" },
        { "@type": "Country", "name": "Montenegro" }
      ],
      "serviceType": ["Digital Marketing", "Web Design", "CRO Optimization", "Business Consulting", "Social Media Management"],
      "priceRange": "$$",
      "founder": {
        "@type": "Person",
        "name": "Aleksandar Nenadic",
        "jobTitle": "CEO"
      },
      "sameAs": [],
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
        "opens": "09:00",
        "closes": "18:00"
      }
    }
    </script>

    <!-- Structured Data - WebSite (enables sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Platinum Zenith",
      "url": "https://platinumzenith.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://platinumzenith.com/blog?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
